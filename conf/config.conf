# =============================================================================
# Manage-DefenderOffline — Configuration File
# =============================================================================
#
# This file provides default values for all Manage-DefenderOffline scripts:
#   • Update-DefenderOffline.ps1  – pushes definition updates to endpoints
#   • Show-DefenderStatus.ps1     – interactive Windows Forms fleet monitor
#   • Start-DefenderDashboard.ps1 – headless HTTP dashboard service
#   • Install-DefenderDashboard.ps1 – one-time dashboard service installer
#
# HOW IT WORKS
#   Each script reads this file at startup and applies any values found here
#   as defaults. Command-line parameters always take precedence — this file
#   only supplies the value when a parameter is not explicitly passed.
#
# FORMAT RULES
#   Key = Value          Standard key/value pair. Leading and trailing
#                        whitespace around both key and value is stripped.
#   # comment            Any line whose first non-whitespace character is #
#                        is treated as a comment and ignored entirely.
#   [Section]            Section headers are optional and ignored by the
#                        parser; they exist solely to organise this file
#                        for human readers.
#   Empty lines          Ignored.
#   Quoted values        Values may optionally be wrapped in single or double quotes.
#                        All three forms are equivalent:
#                          SourceSharePath = \\NAS01\Share\Defender
#                          SourceSharePath = "\\NAS01\Share\Defender"
#                          SourceSharePath = '\\NAS01\Share\Defender'
#                        Quotes must match (opening and closing must be the same type).
#                        Mismatched quotes (e.g. "value') are left as-is.
#   Boolean values       Use: true / false  (case-insensitive)
#   Multi-value fields   Use a comma-separated list (no spaces around commas):
#                        EmailTo = security@contoso.com,soc@contoso.com
#
# =============================================================================


# =============================================================================
[Common]
# Settings shared across multiple scripts.
# =============================================================================

# (Required by Update and Dashboard scripts)
# Base UNC path containing versioned Defender definition packages.
#
# FOLDER STRUCTURE REQUIRED:
#   <SourceSharePath>\<YYYYMMDD>\v#.###.###.#\mpam-fe.exe
#
# Example:
#   \\NAS01\DataShare\Software Installers\_AVDefinitions\Microsoft_Defender
#
# Download the latest definitions from Microsoft:
#   x64   : https://go.microsoft.com/fwlink/?LinkID=121721&arch=x64
#   x86   : https://go.microsoft.com/fwlink/?LinkID=121721&arch=x86
#   ARM64 : https://go.microsoft.com/fwlink/?LinkID=121721&arch=arm64
#
# After downloading, place the file in the versioned subfolder. Example:
#   \\NAS01\DataShare\Software Installers\_AVDefinitions\Microsoft_Defender\20260519\v1.449.681.0\mpam-fe.exe
SourceSharePath =

# Comma-separated list of computer names to skip entirely (no WinRM connection
# attempted). Use this to exclude endpoints managed by a third-party AV product
# (e.g. Trellix, Symantec) or machines that should never be touched by this script.
# Excluded hosts appear in reports with status "Excluded" and are logged as
# administrative exclusions.
# Example: ExcludeComputers = TRELLIXSRV02,SYMANTEC-WS01
ExcludeComputers =

# Maximum number of concurrent WinRM connections when querying or updating
# endpoints in parallel (PowerShell 7+ only; ignored in PS 5.1 serial mode).
# Increase for large environments with ample bandwidth; reduce if the network
# or domain controllers show strain during runs.
# Range: 1–32 | Default: 16
ParallelThreads = 16

# Per-host WinRM operation timeout in seconds. Hosts that do not respond
# within this window are marked as offline/timed-out.
# Range: 5–300 | Default: 30
TimeoutSeconds = 30

# Root directory for all script execution logs on the machine running
# the scripts (not on target endpoints).
# Default: C:\Logs
LogPath = C:\Logs

# Skip IPv6 when testing endpoint reachability. On LAN environments that
# advertise IPv6 ULA / AAAA records in DNS but do not actually route IPv6,
# the OS prefers IPv6 and every unreachable host eats the full TCP timeout
# (~21s) before falling back to IPv4. With DisableIPv6 = true the scripts
# resolve hostnames to IPv4 addresses only and connect directly, dropping
# the unreachable-host detection time to ~3s.
#
# Set to false in environments where IPv6 is fully routed.
# Default: true
DisableIPv6 = true


# =============================================================================
[Update]
# Settings specific to Update-DefenderOffline.ps1
# =============================================================================

# Temporary folder created on each remote endpoint during the update process.
# The script copies mpam-fe.exe here, installs silently, then removes the
# folder. The path must be writable by the account running the script on
# the target computer.
# Default: C:\Temp\Update-DefenderOffline
TempFolderOnTarget = C:\Temp\Update-DefenderOffline

# (Optional) UNC path to a network share where per-host install logs are
# collected after each update. A subfolder named after each computer is
# created automatically. Leave blank to disable remote log collection.
# Example: \\NAS01\DefenderLogs
LogSharePath =

# Directory on the machine running the script where HTML and CSV reports
# are saved after each update run.
# Default: .\Reports  (relative to the script's directory)
ReportPath = .\Reports


# =============================================================================
[Dashboard]
# Settings specific to Start-DefenderDashboard.ps1 and
# Install-DefenderDashboard.ps1
# =============================================================================

# TCP port the HTTP listener binds to. The dashboard will be accessible at:
#   http://<hostname>:<Port>/defender
# If this port is already in use when the service starts, it will
# automatically try FallbackPort (see below) and report the change in logs.
# Range: 1024–65535 | Default: 8080
Port = 8080

# Port to try if Port is unavailable. The installer checks availability at
# install time and updates the scheduled task arguments with the resolved
# port. Start-DefenderDashboard.ps1 also checks at startup in case the
# port situation has changed since installation.
# If FallbackPort is also unavailable, sequential ports are tried (up to 10).
# Range: 1024–65535 | Default: 8090
FallbackPort = 8090

# How often (in seconds) the dashboard refreshes Defender status data from
# all endpoints in the background. The HTML page auto-refreshes at the same
# interval. Shorter intervals increase WinRM load; longer intervals mean
# older data displayed.
# Range: 30–86400 | Default: 300 (5 minutes)
RefreshInterval = 300

# Directory for dashboard service logs (separate from the update logs above
# so the two processes do not write to the same location).
# Default: C:\Logs\DefenderDashboard
DashboardLogPath = C:\Logs\DefenderDashboard

# Default visual theme served at /defender for browsers that have no
# previous preference saved in localStorage.  Individual operators can
# still flip the theme per-browser via the sun/moon toggle in the
# dashboard header; their choice is persisted in browser localStorage
# and takes precedence over this default on subsequent loads.
# Values: Dark | Light  (case-insensitive)
# Default: Dark
DashboardTheme = Dark

# Serve the dashboard over HTTPS instead of HTTP.  When true, Port refers to
# the HTTPS port (typically 8443).  Requires a certificate bound to the listener
# URL — usually created and bound by Install-DefenderDashboard.ps1 with -UseHttps.
# Default: false (preserves v0.0.6 HTTP behavior)
UseHttps = false

# Thumbprint of a certificate in Cert:\LocalMachine\My.  Required when
# UseHttps is true.  The installer populates this automatically when it
# generates or reuses a cert.  To replace an installer-generated self-signed
# cert with a PKI-issued one, import the new cert into Cert:\LocalMachine\My
# and update this value.
# Default: (empty)
CertificateThumbprint =

# When UseHttps is true, also bind a secondary HTTP listener on RedirectHttpPort
# that returns 301 Moved Permanently to the HTTPS URL for every request.  Helps
# operators who bookmark or type http:// out of habit.
# Default: true
RedirectHttpToHttps = true

# Port for the HTTP redirect listener (only used when UseHttps and
# RedirectHttpToHttps are both true).
# Range: 1024–65535 | Default: 8080
RedirectHttpPort = 8080


# =============================================================================
[Install]
# Settings specific to Install-DefenderDashboard.ps1
# =============================================================================

# Name of the Windows Scheduled Task that runs Start-DefenderDashboard.ps1.
# Changing this after installation requires unregistering the old task manually:
#   Unregister-ScheduledTask -TaskName 'OldName' -Confirm:$false
# Default: DefenderDashboard
TaskName = DefenderDashboard

# Task Scheduler folder path. Use \ for the root folder, or a subfolder such
# as \Security to keep tasks organised.
# Default: \
TaskFolder = \


# =============================================================================
[Credentials]
# Settings for WinRM authentication across endpoint tiers.
# =============================================================================

# How to classify endpoints into credential tiers.
#
#   AD      – Queries Active Directory OperatingSystem attribute and the DC flag
#             (userAccountControl bit 0x2000). Default when the machine running
#             the script is domain-joined.
#   Pattern – Matches computer names against WorkstationPattern and
#             DomainControllerPattern below. Use for workgroup environments or
#             when you want explicit control over classification.
#   Single  – All endpoints use one credential; no classification performed.
#             Default when the machine is NOT domain-joined.
#
# Auto-detected if left blank (AD for domain-joined, Single otherwise).
# Default: (auto-detect)
ClassificationMethod =

# Regex patterns used when ClassificationMethod = Pattern.
# Matched case-insensitively against the computer name.
# First match wins; unmatched hosts fall back to MemberServer (ServerCredential).
#
# IMPORTANT: These are EXAMPLES only. You MUST customise them for your
#            naming conventions. Some common pattern forms:
#
#   Prefix only (with or without separator):
#     ^WIN11             matches WIN11-01, WIN1101, WIN11DESK
#   Prefix with optional separator:
#     ^WIN11[-_]?        matches WIN11-01, WIN11_01, WIN1101
#   Alternation:
#     ^(DESKTOP|LAPTOP)  matches DESKTOP01, LAPTOP-JOHN
#   Suffix:
#     (WS|PC)$           matches JOHN-WS, SALES-PC
#
WorkstationPattern = ^(DESKTOP|LAPTOP|WS|WIN10|WIN11)
DomainControllerPattern = ^DC


# =============================================================================
[Email]
# Settings specific to the optional email notification in
# Update-DefenderOffline.ps1
# =============================================================================

# Set to true to send an email notification after each update run.
# Requires SmtpServer and EmailTo to be configured.
# Default: false
SendEmail = false

# Hostname or IP address of your SMTP relay or mail server.
# Example: smtp.contoso.com
SmtpServer =

# SMTP port number.
# Common values: 25 (unauthenticated relay), 587 (STARTTLS), 465 (implicit SSL)
# Default: 25
SmtpPort = 25

# Use SSL/TLS for the SMTP connection.
# Set to true when using port 587 or 465.
# Default: false
SmtpUseSsl = false

# Email address that appears in the From field of notification messages.
# Default: DefenderUpdate@contoso.com
EmailFrom = DefenderUpdate@contoso.com

# One or more recipient addresses, comma-separated (no spaces around commas).
# Example: security@contoso.com,soc@contoso.com
EmailTo =
